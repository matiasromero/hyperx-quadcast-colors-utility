name: HyperXRGB
options:
  bundleIdPrefix: com.matiasromero
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    SWIFT_VERSION: "5.9"

packages:
  HyperXLibs:
    path: .

targets:
  HyperXRGB:
    type: application
    platform: macOS
    sources:
      - path: App/HyperXRGB
    dependencies:
      - package: HyperXLibs
        product: HyperXProtocol
      - package: HyperXLibs
        product: HyperXCore
    info:
      path: App/HyperXRGB/Info.plist
      properties:
        CFBundleName: HyperXRGB
        CFBundleDisplayName: HyperX RGB
        CFBundleShortVersionString: "0.1.2"
        CFBundleVersion: "1"
        CFBundleIconFile: AppIcon
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matiasromero.HyperXRGB
        MARKETING_VERSION: "0.1.2"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: App/HyperXRGB/HyperXRGB.entitlements
